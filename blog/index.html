    (function(){
      try{var t=localStorage.getItem('makki.theme');}catch(e){var t=null;}
      if(!t){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
      document.documentElement.dataset.theme=t;
      document.documentElement.dataset.density='comfy';
      window.__makkiThemeDefault=true;
      window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){
        if(window.__makkiThemeDefault){document.documentElement.dataset.theme=e.matches?'dark':'light';}
      });
    })();

<script>
  (function() {
    var chips = document.querySelectorAll('#topic-bar .topic');
    var featured = document.querySelector('.post.featured');
    var posts = document.querySelectorAll('#post-list .post');

    chips.forEach(function(chip) {
      chip.addEventListener('click', function() {
        var filter = chip.dataset.filter;
        chips.forEach(function(c) { c.classList.remove('active'); });
        chip.classList.add('active');

        if (featured) {
          featured.style.display = (filter === 'all' || featured.dataset.topic === filter) ? '' : 'none';
        }
        posts.forEach(function(post) {
          post.style.display = (filter === 'all' || post.dataset.topic === filter) ? '' : 'none';
        });
      });
    });

    posts.forEach(function(post) {
      post.addEventListener('click', function() {
        var url = post.dataset.url;
        if (url) { window.location.href = url; }
      });
    });
  })();
</script>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      try { localStorage.setItem('makki.theme', t); } catch(e) {}
    }
    if (btn) {
      btn.addEventListener('click', function() {
        var current = document.documentElement.dataset.theme;
        window.__makkiThemeDefault=false;
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    }
  })();
</script>
